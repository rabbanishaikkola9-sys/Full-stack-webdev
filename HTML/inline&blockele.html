<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and block elements</title>
    <style>
        div{
            background-color: red;
        }
        span{
            background-color: yellow;
        }
        article{
            background-color: cyan;
        }
        menu{
            background-color: green;
        }
    </style>
</head>
<body>
    <div>
        this is div
    </div>
    <span>
        this is span
    </span>
    <article>
        This is article
    </article>
    <menu>
        This is menu
    </menu>
</body>
</html>
