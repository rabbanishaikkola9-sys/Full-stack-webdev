<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quickquiz-HTMLforms</title>
</head>
<body>
    <!-- Without using br tag write a vertically aligned form  asking for name and city -->
     <h1>Forms in HTML</h1>
     <form action="post"></form>
     <div>

         <label for="uname">Enter the username:</label>
         <input type="text" name="username" id="uname" placeholder="Enter the username" autofocus required>
        </div>
        <div>
            <label for="city">Enter your city name:</label>
            <input type="text" name="city" id="city" placeholder="Enter your city name ">
        </div>
</body>
</html>
