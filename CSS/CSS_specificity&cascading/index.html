<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>specificity and cascading</title>
    <style>
        .red{
            background-color: red;
        }
        .yellow{
            background-color: yellow;
        }
        .purple{
            background-color: purple;
            color:white;
        }
        [data-x=a]{
            background-color: yellow;
        }
        .cred {
            background-color: yellow !important;
        }
    </style>
</head>
<body>
    <div class="red yellow purple"><h1>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ex cupiditate tempora veritatis.</h1></div>
    <div>
        <h1 data-x="a">Lorem ipsum dolor sit.</h1>
    </div>
    <article class="cred"> <h1 > Lorem ipsum dolor sit, amet consectetur adipisicing elit. Nostrum rerum aliquid delectus!
    </h1></article>
      <article> <h1 > Lorem ipsum dolor sit, amet consectetur adipisicing elit. Nostrum rerum aliquid delectus!
    </h1></article>
    
    
</body>
</html>
